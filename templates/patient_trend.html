{% extends "base.html" %}

{% block title %}病灶量化趋势 - 肺影智诊系统{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-3">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">
            <i class="bi bi-graph-up me-2"></i>病灶量化趋势分析
        </h1>
        <div>
            <button class="btn btn-outline-primary btn-sm me-2" onclick="exportChart()">
                <i class="bi bi-camera"></i> 导出图表
            </button>
            <button class="btn btn-outline-secondary btn-sm" onclick="window.print()">
                <i class="bi bi-printer"></i> 打印
            </button>
        </div>
    </div>

    <!-- 统计卡片（与之前风格一致） -->
    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body d-flex align-items-center">
                    <div class="stat-icon primary me-3">
                        <i class="bi bi-bar-chart-steps"></i>
                    </div>
                    <div>
                        <div class="stat-value" id="totalCount">0</div>
                        <div class="stat-label">诊断总次数</div>
                        <div class="stat-trend">历史记录</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body d-flex align-items-center">
                    <div class="stat-icon success me-3">
                        <i class="bi bi-arrow-up"></i>
                    </div>
                    <div>
                        <div class="stat-value" id="maxValue">--</div>
                        <div class="stat-label">最大病灶占比</div>
                        <div class="stat-trend">峰值</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body d-flex align-items-center">
                    <div class="stat-icon warning me-3">
                        <i class="bi bi-arrow-down"></i>
                    </div>
                    <div>
                        <div class="stat-value" id="minValue">--</div>
                        <div class="stat-label">最小病灶占比</div>
                        <div class="stat-trend">谷值</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card h-100 border-0 shadow-sm">
                <div class="card-body d-flex align-items-center">
                    <div class="stat-icon info me-3">
                        <i class="bi bi-trending-up"></i>
                    </div>
                    <div>
                        <div class="stat-value" id="trendValue">--</div>
                        <div class="stat-label">最近趋势</div>
                        <div class="stat-trend">较上次变化</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 趋势图表卡片 -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-header bg-white py-3">
            <h5 class="card-title mb-0"><i class="bi bi-graph-up me-2"></i>病灶面积占比变化趋势</h5>
        </div>
        <div class="card-body">
            <canvas id="trendChart" height="300" style="max-height: 400px;"></canvas>
            <div class="mt-3 text-muted small">
                <i class="bi bi-info-circle"></i> 数据基于历次诊断报告中的量化指标自动生成。病灶面积占比越低表示病情越稳定。
            </div>
        </div>
    </div>

    <!-- 历史数据表格卡片 -->
    <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3">
            <h5 class="card-title mb-0"><i class="bi bi-table me-2"></i>历史量化数据明细</h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="trendTable">
                    <thead class="table-light">
                        <tr>
                            <th>诊断日期</th>
                            <th>病灶面积占比 (%)</th>
                            <th>分布范围</th>
                        </tr>
                    </thead>
                    <tbody id="trendTableBody">
                        <tr><td colspan="3" class="text-center">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="card-footer bg-white border-top-0 py-3 text-muted small">
                <i class="bi bi-database"></i> 共 <span id="dataCount">0</span> 条记录
            </div>
        </div>
    </div>
</div>

<style>
    /* 与个人信息界面一致的统计卡片样式 */
    .stat-icon {
        width: 50px;
        height: 50px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        flex-shrink: 0;
    }
    .stat-icon.primary {
        background-color: rgba(22, 93, 255, 0.1);
        color: #165DFF;
    }
    .stat-icon.success {
        background-color: rgba(0, 180, 42, 0.1);
        color: #00B42A;
    }
    .stat-icon.warning {
        background-color: rgba(255, 125, 0, 0.1);
        color: #FF7D00;
    }
    .stat-icon.info {
        background-color: rgba(134, 144, 156, 0.1);
        color: #4E5969;
    }
    .stat-value {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 5px;
    }
    .stat-label {
        font-size: 14px;
        color: #4E5969;
        margin-bottom: 5px;
    }
    .stat-trend {
        font-size: 12px;
        color: #86909C;
    }
    .card-header {
        border-bottom: 1px solid #E5E6EB;
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
<script>
    let trendChart = null;

    async function loadTrendData() {
        try {
            const response = await fetch('/api/patient/trend');
            if (!response.ok) throw new Error('获取数据失败');
            const data = await response.json();
            if (!data || data.length === 0) {
                document.getElementById('trendTableBody').innerHTML = '<tr><td colspan="3" class="text-center">暂无量化数据</td></tr>';
                document.getElementById('dataCount').innerText = '0';
                return;
            }

            // 准备表格数据
            const dates = data.map(item => new Date(item.created_at).toLocaleString());
            const ratios = data.map(item => (item.lesion_area_ratio * 100).toFixed(1));
            const distributions = data.map(item => item.distribution_range || '未记录');

            // 渲染表格
            const tbody = document.getElementById('trendTableBody');
            tbody.innerHTML = data.map((item, idx) => `
                <tr>
                    <td>${new Date(item.created_at).toLocaleString()}</td>
                    <td>${(item.lesion_area_ratio * 100).toFixed(1)}%</td>
                    <td>${item.distribution_range || '--'}</td>
                </tr>
            `).join('');
            document.getElementById('dataCount').innerText = data.length;

            // 计算统计值
            const ratiosNum = data.map(d => d.lesion_area_ratio * 100);
            const maxRatio = Math.max(...ratiosNum);
            const minRatio = Math.min(...ratiosNum);
            const lastRatio = ratiosNum[ratiosNum.length - 1];
            const prevRatio = ratiosNum.length > 1 ? ratiosNum[ratiosNum.length - 2] : lastRatio;
            const trend = (lastRatio - prevRatio).toFixed(1);
            const trendText = trend > 0 ? `+${trend}%` : `${trend}%`;
            const trendColor = trend > 0 ? 'text-danger' : (trend < 0 ? 'text-success' : 'text-muted');

            document.getElementById('totalCount').innerText = data.length;
            document.getElementById('maxValue').innerHTML = `${maxRatio.toFixed(1)}%`;
            document.getElementById('minValue').innerHTML = `${minRatio.toFixed(1)}%`;
            document.getElementById('trendValue').innerHTML = `<span class="${trendColor}">${trendText}</span>`;

            // 绘制图表
            if (trendChart) trendChart.destroy();
            const ctx = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(item => new Date(item.created_at).toLocaleDateString()),
                    datasets: [{
                        label: '病灶面积占比 (%)',
                        data: ratiosNum,
                        borderColor: '#165DFF',
                        backgroundColor: 'rgba(22, 93, 255, 0.05)',
                        tension: 0.3,
                        fill: true,
                        pointBackgroundColor: '#165DFF',
                        pointBorderColor: '#fff',
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: { display: true, text: '病灶面积占比 (%)', color: '#4E5969' },
                            grid: { color: '#E5E6EB' }
                        },
                        x: {
                            title: { display: true, text: '诊断日期', color: '#4E5969' },
                            grid: { display: false }
                        }
                    },
                    plugins: {
                        tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toFixed(1)}%` } },
                        legend: { position: 'top' }
                    }
                }
            });
        } catch (error) {
            console.error(error);
            document.getElementById('trendTableBody').innerHTML = '<tr><td colspan="3" class="text-center text-danger">加载失败，请稍后重试</td></tr>';
        }
    }

    function exportChart() {
        if (trendChart) {
            const link = document.createElement('a');
            link.download = 'trend_chart.png';
            link.href = trendChart.canvas.toDataURL();
            link.click();
        } else {
            alert('图表未加载');
        }
    }

    document.addEventListener('DOMContentLoaded', loadTrendData);
</script>
{% endblock %}
